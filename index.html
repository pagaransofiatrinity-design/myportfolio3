<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Sofia's Homepage</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #77a4f7;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background-color: #5a8bd6; }
        .error { color: red; font-size: 14px; margin-top: 10px; display: none; }
        .register-link { margin-top: 15px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Welcome Back</h2>
        <input type="text" id="username" placeholder="Username (sofia)">
        <input type="password" id="password" placeholder="Password (1234)">
        <button onclick="attemptLogin()">Log In</button>
        <p id="errorMsg" class="error">Incorrect username or password!</p>
        
        <div class="register-link">
            <p>Don't have an account? <a href="#" onclick="alert('In a real app, this would open a registration form.')">Sign Up</a></p>
        </div>
    </div>

    <script>
        function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // --- SIMULATED DATABASE ---
            // In a real app, this would check a server. 
            // Here we check if the user is "sofia" and pass is "1234"
            if (user === "sofia" && pass === "1234") {
                // Save login status to browser memory
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', user);
                
                // Redirect to homepage
                window.location.href = "homepage.html";
            } else {
                // Show error
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
