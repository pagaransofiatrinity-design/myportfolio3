<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Sofia's Homepage</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; }
        .login-container { text-align: center; width: 320px; }
        .error { color: #FF6B6B; font-size: 14px; margin-top: 10px; display: none; font-weight: bold; }
        .register-link { margin-top: 20px; font-size: 13px; }
        .register-link a { color: var(--purple-accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>✨ Welcome Back ✨</h2>
        <input type="text" id="username" placeholder="Username (sofia)">
        <input type="password" id="password" placeholder="Password (1234)">
        <button onclick="attemptLogin()">Log In</button>
        <p id="errorMsg" class="error">❌ Incorrect username or password!</p>
        
        <div class="register-link">
            <p>Don't have an account? <a href="#" onclick="alert('In a real app, this would open a registration form.')">Sign Up</a></p>
        </div>
    </div>

    <script>
        function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // --- SIMULATED DATABASE ---
            // In a real app, this would check a server. 
            // Here we check if the user is "sofia" and pass is "1234"
            if (user === "sofia" && pass === "1234") {
                // Save login status to browser memory
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', user);
                
                // Redirect to homepage
                window.location.href = "index.html";
            } else {
                // Show error
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
